<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background:#0a0a0a">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2997ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#bf5af2" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c2e"/>
      <stop offset="100%" stop-color="#12121e"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(41,151,255,0.75)"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.85)">Autonomous Discovery Pipeline</text>

  <!-- Pipeline steps -->
  <!-- Step 1: Hypothesis -->
  <rect x="36" y="180" width="120" height="120" rx="16" fill="url(#boxGrad)" stroke="rgba(41,151,255,0.5)" stroke-width="1.5"/>
  <text x="96" y="226" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="22" fill="rgba(41,151,255,0.9)" filter="url(#softglow)">💡</text>
  <text x="96" y="254" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.85)">Hypothesis</text>
  <text x="96" y="271" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Generation</text>

  <!-- Arrow 1→2 -->
  <line x1="157" y1="240" x2="193" y2="240" stroke="rgba(41,151,255,0.6)" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Experiment -->
  <rect x="196" y="180" width="120" height="120" rx="16" fill="url(#boxGrad)" stroke="rgba(100,180,255,0.4)" stroke-width="1.5"/>
  <text x="256" y="226" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="22" fill="rgba(100,200,255,0.9)" filter="url(#softglow)">🔬</text>
  <text x="256" y="254" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.85)">Experiment</text>
  <text x="256" y="271" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Execution</text>

  <!-- Arrow 2→3 -->
  <line x1="317" y1="240" x2="353" y2="240" stroke="rgba(41,151,255,0.6)" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Measure -->
  <rect x="356" y="180" width="120" height="120" rx="16" fill="url(#boxGrad)" stroke="rgba(160,120,255,0.4)" stroke-width="1.5"/>
  <text x="416" y="226" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="22" fill="rgba(160,120,255,0.9)" filter="url(#softglow)">📊</text>
  <text x="416" y="254" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.85)">Measure</text>
  <text x="416" y="271" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">&amp; Characterize</text>

  <!-- Arrow 3→4 -->
  <line x1="477" y1="240" x2="513" y2="240" stroke="rgba(41,151,255,0.6)" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Learn -->
  <rect x="516" y="180" width="120" height="120" rx="16" fill="url(#boxGrad)" stroke="rgba(191,90,242,0.5)" stroke-width="1.5"/>
  <text x="576" y="226" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="22" fill="rgba(191,90,242,0.9)" filter="url(#softglow)">🧠</text>
  <text x="576" y="254" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.85)">Learn</text>
  <text x="576" y="271" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">&amp; Update</text>

  <!-- Arrow 4→5 -->
  <line x1="637" y1="240" x2="673" y2="240" stroke="rgba(191,90,242,0.6)" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5: Discover -->
  <rect x="676" y="180" width="92" height="120" rx="16" fill="url(#boxGrad)" stroke="url(#g1)" stroke-width="2"/>
  <text x="722" y="226" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="22" fill="rgba(255,255,255,0.9)" filter="url(#softglow)">✨</text>
  <text x="722" y="254" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.85)">Discover</text>
  <text x="722" y="271" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">New Materials</text>

  <!-- Feedback loop arc -->
  <path d="M 722 300 Q 722 410 400 410 Q 96 410 96 300" stroke="rgba(41,151,255,0.25)" stroke-width="1.5" fill="none" stroke-dasharray="6,5"/>
  <polygon points="96,300 90,314 102,314" fill="rgba(41,151,255,0.45)"/>
  <text x="400" y="432" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="0.1em">CONTINUAL LEARNING LOOP</text>

  <!-- Gradient underline bar -->
  <rect x="36" y="160" width="732" height="3" rx="2" fill="url(#g1)" opacity="0.35"/>

  <text x="32" y="460" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">Wu Lab · Princeton Physics</text>
</svg>

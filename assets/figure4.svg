<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background:#f5f5f7">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0071e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="14" font-weight="600" fill="#1d1d1f">Autonomous Discovery Pipeline</text>

  <!-- Step boxes -->
  <rect x="36" y="160" width="118" height="130" rx="18" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="95" y="210" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="26">💡</text>
  <text x="95" y="240" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#1d1d1f">Hypothesis</text>
  <text x="95" y="257" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="#86868b">Generation</text>

  <line x1="154" y1="225" x2="190" y2="225" stroke="#0071e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="193" y="160" width="118" height="130" rx="18" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="252" y="210" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="26">🔬</text>
  <text x="252" y="240" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#1d1d1f">Experiment</text>
  <text x="252" y="257" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="#86868b">Execution</text>

  <line x1="311" y1="225" x2="347" y2="225" stroke="#0071e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="350" y="160" width="118" height="130" rx="18" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="409" y="210" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="26">📊</text>
  <text x="409" y="240" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#1d1d1f">Measure</text>
  <text x="409" y="257" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="#86868b">&amp; Analyze</text>

  <line x1="468" y1="225" x2="504" y2="225" stroke="#0071e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="507" y="160" width="118" height="130" rx="18" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="566" y="210" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="26">🧠</text>
  <text x="566" y="240" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#1d1d1f">Learn</text>
  <text x="566" y="257" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="#86868b">&amp; Update</text>

  <line x1="625" y1="225" x2="651" y2="225" stroke="#0071e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="654" y="160" width="110" height="130" rx="18" fill="#0071e3"/>
  <text x="709" y="210" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="26">✨</text>
  <text x="709" y="240" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="12" font-weight="600" fill="white">Discover</text>
  <text x="709" y="257" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.72)">New Materials</text>

  <!-- Feedback loop -->
  <path d="M 709 290 Q 709 400 400 400 Q 95 400 95 290" stroke="#d2d2d7" stroke-width="1.5" fill="none" stroke-dasharray="5,5"/>
  <polygon points="95,290 89,304 101,304" fill="#d2d2d7"/>
  <text x="400" y="424" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="#86868b" letter-spacing="0.08em">CONTINUAL LEARNING LOOP</text>

  <text x="32" y="460" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="#86868b">Wu Lab · Princeton Physics</text>

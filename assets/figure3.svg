<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background:#0a0a0a">
  <defs>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2997ff"/>
      <stop offset="100%" stop-color="#bf5af2"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(41,151,255,0.7)"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.85)">Multi-Agent System Architecture</text>

  <!-- Center: Orchestrator -->
  <circle cx="400" cy="240" r="62" fill="url(#nodeGrad)" stroke="url(#blue)" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="234" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#2997ff">Orchestrator</text>
  <text x="400" y="252" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">LLM Core</text>

  <!-- Agent nodes -->
  <!-- Top: Hypothesis Agent -->
  <circle cx="400" cy="100" r="48" fill="url(#nodeGrad)" stroke="rgba(41,151,255,0.5)" stroke-width="1.5"/>
  <text x="400" y="95" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.9)">Hypothesis</text>
  <text x="400" y="110" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Agent</text>

  <!-- Right: Experiment Agent -->
  <circle cx="600" cy="240" r="48" fill="url(#nodeGrad)" stroke="rgba(191,90,242,0.5)" stroke-width="1.5"/>
  <text x="600" y="235" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.9)">Experiment</text>
  <text x="600" y="250" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Agent</text>

  <!-- Bottom: Analysis Agent -->
  <circle cx="400" cy="380" r="48" fill="url(#nodeGrad)" stroke="rgba(41,151,255,0.5)" stroke-width="1.5"/>
  <text x="400" y="375" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.9)">Analysis</text>
  <text x="400" y="390" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Agent</text>

  <!-- Left: Knowledge Agent -->
  <circle cx="200" cy="240" r="48" fill="url(#nodeGrad)" stroke="rgba(191,90,242,0.5)" stroke-width="1.5"/>
  <text x="200" y="235" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.9)">Knowledge</text>
  <text x="200" y="250" text-anchor="middle" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Agent</text>

  <!-- Connecting lines -->
  <line x1="400" y1="148" x2="400" y2="178" stroke="rgba(41,151,255,0.5)" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="462" y1="240" x2="548" y2="240" stroke="rgba(191,90,242,0.5)" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="400" y1="302" x2="400" y2="332" stroke="rgba(41,151,255,0.5)" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="338" y1="240" x2="252" y2="240" stroke="rgba(191,90,242,0.5)" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- Feedback arcs (curved) -->
  <path d="M 445 175 Q 530 175 555 210" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none" stroke-dasharray="3,4"/>
  <path d="M 570 285 Q 530 350 445 365" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none" stroke-dasharray="3,4"/>
  <path d="M 355 365 Q 265 340 238 288" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none" stroke-dasharray="3,4"/>
  <path d="M 228 195 Q 285 148 355 120" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none" stroke-dasharray="3,4"/>

  <!-- Corner labels -->
  <text x="32" y="458" font-family="-apple-system,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">Wu Lab · Princeton Physics</text>
</svg>
